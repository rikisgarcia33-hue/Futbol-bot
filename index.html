<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0f0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fútbol Bot">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Fútbol Value Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0f0a;--surface:#101a10;--surface2:#182018;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --green:#2ECC5A;--green-dim:rgba(46,204,90,0.1);--green-dark:#0d5c1e;
  --gold:#F0C040;--gold-dim:rgba(240,192,64,0.12);
  --red:#E83A3A;--red-dim:rgba(232,58,58,0.1);
  --amber:#F5A623;--amber-dim:rgba(245,166,35,0.1);
  --blue:#4A9EE8;--blue-dim:rgba(74,158,232,0.1);
  --text:#EFF5EE;--text2:rgba(239,245,238,0.5);--text3:rgba(239,245,238,0.28);
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;overflow-x:hidden;}
.header{position:sticky;top:0;z-index:100;background:rgba(10,15,10,0.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:0.5px solid var(--border);padding:calc(var(--safe-top) + 12px) 16px 12px;display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{width:34px;height:34px;border-radius:10px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:18px;}
.brand-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;}
.brand-name span{color:var(--green);}
.live-row{display:flex;align-items:center;gap:8px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.clock{font-size:12px;color:var(--text2);font-family:'Barlow Condensed',sans-serif;}
.req-badge{font-size:10px;color:var(--text3);background:var(--surface2);padding:2px 7px;border-radius:4px;}

/* LEAGUE TABS */
.league-scroll{display:flex;gap:6px;overflow-x:auto;padding:10px 12px 8px;border-bottom:0.5px solid var(--border);background:var(--bg);position:sticky;top:58px;z-index:99;scrollbar-width:none;}
.league-scroll::-webkit-scrollbar{display:none;}
.ltab{flex-shrink:0;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:600;border:0.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-family:'Barlow',sans-serif;transition:all .15s;white-space:nowrap;}
.ltab.active{background:var(--green-dim);border-color:var(--green);color:var(--green);}
.ltab .lcount{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:var(--green);color:#000;font-size:8px;margin-left:4px;vertical-align:middle;font-weight:700;}

/* PAGE NAV */
.nav{display:flex;border-bottom:0.5px solid var(--border);background:var(--bg);position:sticky;top:103px;z-index:98;padding:0 16px;}
.nav-tab{flex:1;padding:10px 0;font-size:12px;font-weight:600;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;transition:all .2s;font-family:'Barlow',sans-serif;}
.nav-tab.active{color:var(--green);border-bottom-color:var(--green);}
.bc{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:var(--green);color:#000;font-size:9px;margin-left:4px;vertical-align:middle;font-weight:700;}

.page{display:none;padding:10px 12px calc(var(--safe-bot) + 72px);}
.page.active{display:block;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px;}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:var(--text3);}
.error-box{background:var(--red-dim);border:0.5px solid rgba(232,58,58,.3);border-radius:12px;padding:12px 14px;margin:8px 0;font-size:13px;color:var(--red);line-height:1.5;}

.date-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 0 8px;}
.date-label{font-size:13px;font-weight:600;color:var(--text2);}
.refresh-btn{display:flex;align-items:center;gap:5px;background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:5px 10px;color:var(--text2);font-size:11px;cursor:pointer;}
.refresh-btn:active{opacity:.7;}

/* LEAGUE HEADER */
.league-hdr{display:flex;align-items:center;gap:8px;padding:8px 0 6px;margin-top:4px;}
.league-flag{font-size:16px;}
.league-name{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;}

/* SCORECARD */
.scorecard{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px;}
.scorecard thead tr{border-bottom:0.5px solid var(--border2);}
.scorecard thead th{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.07em;padding:5px 5px 7px;text-align:left;}
.scorecard thead th.c{text-align:center;}
.scorecard tbody tr.game-row{border-bottom:0.5px solid var(--border);cursor:pointer;transition:background .1s;}
.scorecard tbody tr.game-row:active{background:var(--surface2);}
.scorecard tbody tr.vrow{background:rgba(46,204,90,0.05);}
.td-t{padding:9px 5px;}
.ml{display:flex;flex-direction:column;gap:3px;}
.tline{display:flex;align-items:center;gap:6px;}
.tabb{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;color:var(--text);min-width:30px;}
.tfull{font-size:11px;color:var(--text3);}
.td-ou{padding:9px 5px;text-align:center;vertical-align:middle;}
.ou-block{display:flex;flex-direction:column;gap:3px;align-items:center;}
.ou-row{display:flex;align-items:center;gap:4px;}
.ou-label{font-size:9px;color:var(--text3);font-weight:600;text-transform:uppercase;min-width:12px;}
.ou-num{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;line-height:1;}
.ou-num.val{color:var(--green);}
.ou-num.fair{color:var(--text2);}
.ou-num.over{color:var(--red);}
.ou-num.none{color:var(--text3);font-size:11px;}
.td-line{padding:9px 5px;text-align:center;vertical-align:middle;}
.line-stack{display:flex;flex-direction:column;gap:3px;align-items:center;}
.ln{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;line-height:1;color:var(--text2);}
.td-m{padding:9px 4px;text-align:right;vertical-align:middle;}
.ttxt{font-size:10px;color:var(--text3);white-space:nowrap;}
.vtag{display:inline-flex;padding:2px 5px;border-radius:4px;font-size:9px;font-weight:700;font-family:'Barlow Condensed',sans-serif;margin-top:3px;}
.vtag.pos{background:var(--green-dim);color:var(--green);}
.vtag.none{background:var(--surface2);color:var(--text3);}
.vtag.soon{background:var(--amber-dim);color:var(--amber);}
.vtag.cor{background:var(--blue-dim);color:var(--blue);}

/* DETAIL */
.detail-tr td{padding:0;}
.di{padding:10px 8px 12px;background:var(--bg);border-bottom:0.5px solid var(--border2);}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.dblock{background:var(--surface);border-radius:10px;padding:9px 11px;}
.dtitle{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-bottom:6px;}
.drow{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:0.5px solid var(--border);font-size:12px;}
.drow:last-child{border-bottom:none;}
.dl{color:var(--text3);}
.dv{color:var(--text);font-weight:600;}

/* VALUE CARDS */
.val-header{display:flex;align-items:center;justify-content:space-between;padding:8px 0 10px;}
.val-count{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--green);}
.val-sub{font-size:11px;color:var(--text3);}
.range-pill{display:flex;align-items:center;gap:6px;background:var(--surface);border:0.5px solid var(--border2);border-radius:8px;padding:6px 10px;cursor:pointer;}
.range-pill span{font-size:12px;color:var(--text2);}
.range-pill strong{font-family:'Barlow Condensed',sans-serif;font-size:15px;color:var(--green);}

.vc{background:var(--surface);border:0.5px solid rgba(46,204,90,.3);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.vc-head{padding:11px 14px 9px;border-bottom:0.5px solid var(--border);}
.vc-league{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-bottom:3px;}
.vc-teams{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;color:var(--text);margin-bottom:3px;}
.vc-meta{display:flex;align-items:center;justify-content:space-between;}
.vc-time{font-size:11px;color:var(--text3);}
.vc-edge{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--green);}
.vc-body{display:grid;grid-template-columns:1fr 0.5px 1fr 0.5px 1fr 0.5px 1fr;}
.vc-col{padding:10px 6px;text-align:center;}
.vc-div{background:var(--border);}
.vc-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:4px;}
.vc-num{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;line-height:1;}
.vc-sub{font-size:9px;color:var(--text3);margin-top:2px;}
.vc-foot{padding:8px 14px;background:var(--bg);display:flex;gap:6px;flex-wrap:wrap;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal-box{width:100%;background:var(--surface);border-radius:20px 20px 0 0;padding:20px 20px calc(var(--safe-bot) + 20px);}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;margin-bottom:16px;}
.modal-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.modal-lbl{font-size:13px;color:var(--text2);min-width:56px;}
.modal-input{flex:1;background:var(--surface2);border:0.5px solid var(--border2);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;text-align:center;border-radius:10px;padding:10px;outline:none;-webkit-appearance:none;}
.modal-input:focus{border-color:var(--green);}
.modal-apply{width:100%;background:var(--green);color:#000;border:none;border-radius:12px;padding:13px;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;cursor:pointer;margin-top:4px;}
.modal-apply:active{opacity:.8;}
.modal-cancel{width:100%;background:none;border:none;color:var(--text3);font-size:13px;padding:12px;cursor:pointer;font-family:'Barlow',sans-serif;}

.empty{text-align:center;padding:50px 20px;}
.empty-icon{font-size:36px;opacity:.3;margin-bottom:12px;}
.empty-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--text2);margin-bottom:6px;}
.empty-sub{font-size:13px;color:var(--text3);line-height:1.5;}

.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,15,10,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:0.5px solid var(--border);display:flex;padding-bottom:var(--safe-bot);z-index:200;}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 0 5px;background:none;border:none;cursor:pointer;color:var(--text3);transition:color .15s;font-family:'Barlow',sans-serif;}
.bnav-btn.active{color:var(--green);}
.bnav-icon{font-size:19px;margin-bottom:2px;line-height:1;}
.bnav-lbl{font-size:10px;font-weight:600;letter-spacing:.04em;}
</style>
</head>
<body>

<div class="header">
  <div class="brand">
    <div class="brand-icon">⚽</div>
    <div class="brand-name">Fútbol <span>Value</span> Bot</div>
  </div>
  <div class="live-row">
    <div class="dot"></div>
    <span class="clock" id="clock">--:--</span>
    <span class="req-badge" id="req-left">500 req</span>
  </div>
</div>

<!-- LEAGUE FILTER -->
<div class="league-scroll" id="league-scroll">
  <button class="ltab active" onclick="setLeague('all',this)">Todas</button>
  <button class="ltab" onclick="setLeague('soccer_germany_bundesliga',this)">🇩🇪 Bundesliga</button>
  <button class="ltab" onclick="setLeague('soccer_epl',this)">🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier</button>
  <button class="ltab" onclick="setLeague('soccer_italy_serie_a',this)">🇮🇹 Serie A</button>
  <button class="ltab" onclick="setLeague('soccer_spain_la_liga',this)">🇪🇸 La Liga</button>
  <button class="ltab" onclick="setLeague('soccer_mexico_ligamx',this)">🇲🇽 Liga MX</button>
</div>

<nav class="nav">
  <button class="nav-tab active" onclick="goPage('hoy',0)">Hoy</button>
  <button class="nav-tab" onclick="goPage('valor',1)">Valor <span class="bc" id="val-count" style="display:none">0</span></button>
  <button class="nav-tab" onclick="goPage('analisis',2)">Análisis</button>
</nav>

<div class="page active" id="page-hoy">
  <div class="date-bar">
    <span class="date-label" id="date-label">Cargando...</span>
    <button class="refresh-btn" onclick="init()">↻ Actualizar</button>
  </div>
  <div id="hoy-content"><div class="loading"><div class="spinner"></div><div class="loading-txt">Conectando con The Odds API...</div></div></div>
</div>

<div class="page" id="page-valor">
  <div class="val-header">
    <div>
      <div class="val-count" id="val-title">— picks</div>
      <div class="val-sub">O/U goles · O/U corners con valor</div>
    </div>
    <div class="range-pill" onclick="openModal()">
      <span>Rango</span><strong id="range-pill-text">1.57–1.77</strong><span>✎</span>
    </div>
  </div>
  <div id="valor-content"></div>
</div>

<div class="page" id="page-analisis">
  <div class="date-bar"><span class="date-label">Análisis del día</span></div>
  <div id="analisis-content"><div class="loading"><div class="spinner"></div><div class="loading-txt">Preparando...</div></div></div>
</div>

<div class="modal-overlay" id="modal" onclick="closeModalOut(event)">
  <div class="modal-box">
    <div class="modal-title">Rango de cuota</div>
    <div class="modal-row"><span class="modal-lbl">Mínima</span><input class="modal-input" type="number" id="m-min" value="1.57" step="0.01"></div>
    <div class="modal-row"><span class="modal-lbl">Máxima</span><input class="modal-input" type="number" id="m-max" value="1.77" step="0.01"></div>
    <button class="modal-apply" onclick="applyModal()">Aplicar</button>
    <button class="modal-cancel" onclick="closeModal()">Cancelar</button>
  </div>
</div>

<nav class="bnav">
  <button class="bnav-btn active" id="bn0" onclick="goPage('hoy',0)"><div class="bnav-icon">⚽</div><div class="bnav-lbl">Hoy</div></button>
  <button class="bnav-btn" id="bn1" onclick="goPage('valor',1)"><div class="bnav-icon">⭐</div><div class="bnav-lbl">Valor</div></button>
  <button class="bnav-btn" id="bn2" onclick="goPage('analisis',2)"><div class="bnav-icon">📊</div><div class="bnav-lbl">Análisis</div></button>
</nav>

<script>
const API_KEY='2d161db1992514c7e236860a16a4f49d';
const LEAGUES=[
  {key:'soccer_germany_bundesliga', name:'Bundesliga', flag:'🇩🇪'},
  {key:'soccer_epl',                name:'Premier League', flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿'},
  {key:'soccer_italy_serie_a',      name:'Serie A', flag:'🇮🇹'},
  {key:'soccer_spain_la_liga',      name:'La Liga', flag:'🇪🇸'},
  {key:'soccer_mexico_ligamx',      name:'Liga MX', flag:'🇲🇽'},
];

let minOdds=1.57, maxOdds=1.77;
let allGames={}; // keyed by league key
let activeLeague='all';

function tick(){
  const d=new Date();
  document.getElementById('clock').textContent=
    String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
tick(); setInterval(tick,15000);

function goPage(name,idx){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.nav-tab')[idx].classList.add('active');
  document.querySelectorAll('.bnav-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
}

function setLeague(key, btn){
  activeLeague=key;
  document.querySelectorAll('.ltab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function getFilteredGames(){
  if(activeLeague==='all') return LEAGUES.flatMap(l=>allGames[l.key]||[]);
  return allGames[activeLeague]||[];
}

async function init(){
  document.getElementById('hoy-content').innerHTML='<div class="loading"><div class="spinner"></div><div class="loading-txt">Cargando ligas...</div></div>';
  document.getElementById('date-label').textContent=new Date().toLocaleDateString('es',{weekday:'long',day:'numeric',month:'long'});

  const today=new Date().toISOString().slice(0,10);
  let totalReq=500;

  // Fetch all leagues in parallel
  const fetches=LEAGUES.map(async l=>{
    try{
      // Fetch h2h + totals (goals O/U)
      const url=`https://api.the-odds-api.com/v4/sports/${l.key}/odds/?apiKey=${API_KEY}&regions=eu,uk,us&markets=h2h,totals&oddsFormat=decimal&dateFormat=iso`;
      const res=await fetch(url);
      const rem=res.headers.get('x-requests-remaining');
      if(rem) totalReq=parseInt(rem);
      if(!res.ok) return;
      const raw=await res.json();
      const todayGames=raw.filter(g=>g.commence_time.slice(0,10)===today);
      const src=todayGames.length>0?todayGames:[];
      allGames[l.key]=src.map(g=>enrichGame(g,l));
    }catch(e){
      console.warn('Error fetching',l.key,e);
      allGames[l.key]=MOCK_GAMES.filter(m=>m.league===l.key).map(g=>enrichGame(g,l));
    }
  });

  await Promise.all(fetches);
  document.getElementById('req-left').textContent=totalReq+' req';

  // If all empty, use mock
  const total=LEAGUES.reduce((s,l)=>s+(allGames[l.key]?.length||0),0);
  if(total===0){
    LEAGUES.forEach(l=>{ allGames[l.key]=MOCK_GAMES.filter(m=>m.league===l.key).map(g=>enrichGame(g,l)); });
    document.getElementById('hoy-content').innerHTML='<div class="error-box">⚠️ Sin conexión — mostrando datos de ejemplo</div>';
  }

  // Update league tab counts
  updateLeagueCounts();
  renderAll();
}

function updateLeagueCounts(){
  const tabs=document.querySelectorAll('.ltab');
  tabs.forEach(t=>{
    const lkey=t.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
    if(!lkey||lkey==='all') return;
    const cnt=allGames[lkey]?.length||0;
    let sp=t.querySelector('.lcount');
    if(cnt>0){
      if(!sp){sp=document.createElement('span');sp.className='lcount';t.appendChild(sp);}
      sp.textContent=cnt;
    }
  });
  // All count
  const total=LEAGUES.reduce((s,l)=>s+(allGames[l.key]?.length||0),0);
  const allTab=tabs[0];
  let sp=allTab.querySelector('.lcount');
  if(total>0){
    if(!sp){sp=document.createElement('span');sp.className='lcount';allTab.appendChild(sp);}
    sp.textContent=total;
  }
}

function enrichGame(g,league){
  // Extract best h2h odds
  let mktH=null,mktA=null,bookName='';
  // Extract totals (goals O/U line)
  let goalsLine=null,goalsOver=null,goalsUnder=null;

  for(const bk of (g.bookmakers||[])){
    const h2h=bk.markets?.find(m=>m.key==='h2h');
    const tot=bk.markets?.find(m=>m.key==='totals');
    if(h2h){
      const h=h2h.outcomes.find(o=>o.name===g.home_team);
      const a=h2h.outcomes.find(o=>o.name===g.away_team);
      if(h&&(!mktH||h.price>mktH)){mktH=h.price;bookName=bk.title;}
      if(a&&(!mktA||a.price>mktA)) mktA=a.price;
    }
    if(tot&&!goalsLine){
      const ov=tot.outcomes.find(o=>o.name==='Over');
      const un=tot.outcomes.find(o=>o.name==='Under');
      if(ov){goalsLine=ov.point;goalsOver=ov.price;goalsUnder=un?.price||null;}
    }
  }

  const hasOdds=mktH!==null;
  mktH=parseFloat((mktH||2.10).toFixed(2));
  mktA=parseFloat((mktA||3.20).toFixed(2));

  // Bot model for goals O/U
  // Average goals in top leagues ~2.65
  const leagueAvg={
    soccer_germany_bundesliga:3.1, soccer_epl:2.8,
    soccer_italy_serie_a:2.6, soccer_spain_la_liga:2.7,
    soccer_mexico_ligamx:2.65
  };
  const avgGoals=leagueAvg[league.key]||2.65;

  // Bot projected line & odds
  const projGoals=parseFloat((avgGoals*(0.9+Math.random()*0.25)).toFixed(1));
  const botGoalsLine=parseFloat((projGoals).toFixed(1));
  // Bot odds for Over/Under based on poisson approximation
  const botOver=parseFloat((1/(1-poissonCDF(Math.floor(goalsLine||projGoals), projGoals))).toFixed(2));
  const botUnder=parseFloat((1/poissonCDF(Math.floor(goalsLine||projGoals), projGoals)).toFixed(2));

  // Corners projection (avg ~10 per game in top leagues)
  const avgCorners={
    soccer_germany_bundesliga:10.2,soccer_epl:10.5,
    soccer_italy_serie_a:9.8,soccer_spain_la_liga:10.0,
    soccer_mexico_ligamx:9.5
  };
  const projCorners=parseFloat(((avgCorners[league.key]||10)*(0.88+Math.random()*0.28)).toFixed(1));
  const cornersLine=projCorners>10?10.5:9.5;
  const botCornersOver=parseFloat((1.82+Math.random()*0.2).toFixed(2));
  const botCornersUnder=parseFloat((1.92+Math.random()*0.2).toFixed(2));
  const mktCornersOver=parseFloat((botCornersOver*(0.93+Math.random()*0.1)).toFixed(2));

  // Edge detection
  const goalsEdge=goalsOver?((botOver-goalsOver)/goalsOver*100):0;
  const cornersEdge=((botCornersOver-mktCornersOver)/mktCornersOver*100);

  let valueType=null, edge=0;
  if(inRange(botOver)&&goalsEdge>1.5){valueType='goals-over';edge=goalsEdge;}
  else if(inRange(botUnder)&&goalsEdge<-1.5&&inRange(goalsUnder)){valueType='goals-under';edge=Math.abs(goalsEdge);}
  else if(inRange(botCornersOver)&&cornersEdge>1.5){valueType='corners';edge=cornersEdge;}

  const dt=new Date(g.commence_time);
  const time=dt.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});

  return {
    id:(g.home_team+g.away_team).replace(/\s/g,''),
    homeTeam:g.home_team, awayTeam:g.away_team,
    homeAbbr:soccerAbbr(g.home_team), awayAbbr:soccerAbbr(g.away_team),
    league, time, hasOdds,
    mktHome:mktH, mktAway:mktA, bookName:bookName||'Bet365',
    goalsLine:goalsLine||projGoals,
    goalsOver:parseFloat((goalsOver||botOver).toFixed(2)),
    goalsUnder:parseFloat((goalsUnder||botUnder).toFixed(2)),
    botGoalsOver:botOver, botGoalsUnder:botUnder,
    projGoals, botGoalsLine,
    cornersLine, projCorners,
    mktCornersOver, botCornersOver,
    valueType, edge:parseFloat(edge.toFixed(1)),
    confidence:Math.round(52+Math.abs(edge)*2.5)
  };
}

// Simple Poisson CDF approximation
function poissonCDF(k,lambda){
  let p=0,e=Math.exp(-lambda),fact=1;
  for(let i=0;i<=k;i++){
    if(i>0) fact*=i;
    p+=e*Math.pow(lambda,i)/fact;
  }
  return Math.min(p,0.99);
}

function inRange(o){return o>=minOdds&&o<=maxOdds;}

    'Arsenal':'ARS','Chelsea':'CHE','Liverpool':'LIV','Manchester City':'MCI',
    'Manchester United':'MUN','Newcastle United':'NEW','Tottenham Hotspur':'TOT',
    'Aston Villa':'AVL','West Ham United':'WHU','Brighton':'BHA',
    'Inter Milan':'INT','AC Milan':'ACM','Juventus':'JUV','Roma':'ROM',
    'Napoli':'NAP','Lazio':'LAZ','Atalanta':'ATA','Fiorentina':'FIO',
    'Real Madrid':'RMA','Barcelona':'BAR','Atletico Madrid':'ATM',
    'Sevilla':'SEV','Real Sociedad':'SOC','Valencia':'VAL','Villarreal':'VIL',
    'Club America':'AME','Guadalajara':'GDL','Cruz Azul':'CAZ','UNAM':'PUM',

  };
  return MAP[name]||name.split(' ').slice(-1)[0].slice(0,3).toUpperCase();
}
